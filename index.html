<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>شبشب الهجاء</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="main">
        <section class="stage">
          <h2>مقام النعل والحذاء</h2>
          <div class="target-wrap" id="targetWrap">
            <img id="target" class="target" alt="الصورة المستهدفة" />
            <img
              class="slipper"
              id="slipper"
              src="assets/slipper.png"
              alt="شبشب"
              data-stance="top"
            />
          </div>
          <button id="slapBtn" class="slap-btn">اضرب بالشبشب</button>
          <p class="hint">زر المسافة أو Enter يشتغل كمان.</p>
        </section>

        <section class="panel">
          <h2>موضع الهجاء</h2>
          <div id="chantDisplay" class="chant-display" aria-live="polite">
            جاهز للضربة الأولى.
          </div>
          <ul id="chantLog" class="chant-log"></ul>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
